<aside class="terminal-panel" aria-label="Resumo técnico do portfólio Angular">
  <div class="panel-bar">
    <span></span>
    <span></span>
    <span></span>
    <strong>angular.workspace</strong>
  </div>

  <div class="terminal-body" aria-live="polite">
    <p>
      <span class="typed-text command-line" data-terminal-text="ng serve portfolio"></span>
    </p>
    <p class="ok">
      <span
        class="typed-text"
        data-terminal-text="OK Angular app running with standalone components"
        data-terminal-speed="fast"
      ></span>
    </p>
    <p class="muted">
      <span class="typed-text" [attr.data-terminal-text]="'owner: ' + owner() + ' / role: ' + role()"></span>
    </p>
    <p>
      <span class="typed-text command-line" data-terminal-text="ng build --configuration production"></span>
    </p>
    <p class="ok">
      <span class="typed-text build-output" [attr.data-terminal-text]="buildOutput" data-terminal-speed="fast"></span>
      <span class="terminal-cursor" aria-hidden="true"></span>
    </p>
  </div>
</aside>
