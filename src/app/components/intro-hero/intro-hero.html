<section id="apresentacao" class="hero section-grid">
  <div
    class="hero-copy"
    appScrollReveal=".eyebrow, h1, .hero-text, .hero-actions a"
    [appScrollRevealY]="24"
    [appScrollRevealDuration]="0.64"
    [appScrollRevealStagger]="0.06"
    appScrollRevealStart="top 88%"
  >
    <p class="eyebrow" appScrambleText>Portfolio em construcao / Etapa 01</p>
    <h1>Desenvolvedor full-stack criando aplicações web.</h1>
    <p class="hero-text" >{{ profile().intro }}</p>

    <div class="hero-actions" aria-label="Acoes principais">
      <a class="button button-primary" href="mailto:bc.luizo@gmail.com">Entrar em contato</a>
      <a class="button button-secondary" href="#projetos">Ver projetos</a>
    </div>
  </div>

  <app-terminal-panel [owner]="profile().name" [role]="profile().role" />
</section>
