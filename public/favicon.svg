<svg xmlns="http://www.w3.org/2000/svg" width="90" height="93" viewBox="0 0 90 93" role="img" aria-labelledby="title desc">
  <title id="title">LO icon</title>
  <desc id="desc">Ícone com quadrado verde escuro, borda verde clara e texto LO em verde claro usando fonte monoespaçada.</desc>
  <style>
    :root {
      --font-mono: "Geist Mono", "SFMono-Regular", Consolas, monospace;
    }

